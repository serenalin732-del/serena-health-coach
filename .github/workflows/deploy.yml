name: Deploy to Cloudflare Pages

# Builds the Expo web export and deploys it to Cloudflare Pages on every push
# to main. Uses wrangler directly, so it does not depend on Cloudflare's Git
# integration being connected. Can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; cancel an in-progress one if a
# newer commit lands.
concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check and test
        run: |
          npm run typecheck
          npm test

      - name: Verify VAPID public key
        # Optional: if the push key is set, fail fast on a malformed value so a
        # broken key never silently ships. If unset, push enrollment just stays
        # disabled — not an error.
        env:
          VAPID: ${{ secrets.EXPO_PUBLIC_VAPID_PUBLIC_KEY }}
        run: |
          if [ -z "$VAPID" ]; then
            echo "ℹ️  EXPO_PUBLIC_VAPID_PUBLIC_KEY not set — web push enrollment stays disabled."
            exit 0
          fi
          b64=$(printf '%s' "$VAPID" | tr '_-' '/+')
          pad=$(( (4 - ${#b64} % 4) % 4 ))
          b64="$b64$(printf '=%.0s' $(seq 1 $pad))"
          bytes=$(printf '%s' "$b64" | base64 -d 2>/dev/null | wc -c)
          if [ "$bytes" -ne 65 ]; then
            echo "❌ EXPO_PUBLIC_VAPID_PUBLIC_KEY decodes to $bytes bytes (expected 65 for a P-256 VAPID key). Check the key."
            exit 1
          fi
          echo "✅ VAPID public key looks valid (65 bytes)."

      - name: Build web export
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          # Optional — public VAPID key so the browser can subscribe to push.
          # Safe to leave unset; push enrollment stays gracefully disabled.
          EXPO_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_VAPID_PUBLIC_KEY }}

      # Cloudflare Pages / wrangler silently skip any directory named
      # `node_modules`. Expo nests web assets under dist/assets/node_modules/...,
      # so every font was excluded from the deploy and the app rendered a blank
      # screen (the root layout returns null until useFonts resolves). Rename
      # that directory and rewrite the references in the build output so the
      # fonts are uploaded and resolve correctly.
      - name: Rename node_modules assets for Cloudflare Pages
        run: |
          if [ -d dist/assets/node_modules ]; then
            mv dist/assets/node_modules dist/assets/node_deps
            grep -rl 'assets/node_modules' dist | xargs --no-run-if-empty sed -i 's#assets/node_modules#assets/node_deps#g'
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy the built `dist/` directory explicitly so the whole asset
          # tree (the _expo JS bundle and assets/ fonts) is uploaded, not just
          # the top-level files. --branch=main marks this a production deploy.
          command: pages deploy dist --project-name=serena-health-coach --branch=main --commit-dirty=true
