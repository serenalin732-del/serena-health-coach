name: Deploy to Cloudflare Pages

# Builds the Expo web export and deploys it to Cloudflare Pages on every push
# to main. Uses wrangler directly, so it does not depend on Cloudflare's Git
# integration being connected. Can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; cancel an in-progress one if a
# newer commit lands.
concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check and test
        run: |
          npm run typecheck
          npm test

      - name: Build web export
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # wrangler pages deploy applies the working-directory .gitignore to the
      # files it uploads. Our .gitignore ignores `node_modules/`, and Expo
      # writes font/image assets to dist/assets/node_modules/..., so every font
      # was being skipped — leaving the app with no fonts and a blank screen
      # (the root layout renders null until fonts load). CI is ephemeral, so
      # remove .gitignore before deploying to upload the whole dist/ tree.
      - name: Remove .gitignore so wrangler uploads all assets
        run: rm -f .gitignore

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy the built `dist/` directory explicitly so the whole asset
          # tree (the _expo JS bundle and assets/ fonts) is uploaded, not just
          # the top-level files. --branch=main marks this a production deploy.
          command: pages deploy dist --project-name=serena-health-coach --branch=main --commit-dirty=true
